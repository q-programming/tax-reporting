name: Factory Droid

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, edited]

jobs:
  custom-droid:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@droid')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@droid')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@droid')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@droid') || contains(github.event.issue.title, '@droid'))) ||
      (github.event_name == 'pull_request' && (contains(github.event.pull_request.body, '@droid') || contains(github.event.pull_request.title, '@droid')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect package manager
        id: detect-pm
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            echo "pm=pnpm" >> $GITHUB_OUTPUT
            echo "lockfile=pnpm-lock.yaml" >> $GITHUB_OUTPUT
          elif [ -f "yarn.lock" ]; then
            echo "pm=yarn" >> $GITHUB_OUTPUT
            echo "lockfile=yarn.lock" >> $GITHUB_OUTPUT
          elif [ -f "package-lock.json" ]; then
            echo "pm=npm" >> $GITHUB_OUTPUT
            echo "lockfile=package-lock.json" >> $GITHUB_OUTPUT
          else
            echo "pm=none" >> $GITHUB_OUTPUT
          fi

      - name: Setup pnpm
        if: steps.detect-pm.outputs.pm == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        if: steps.detect-pm.outputs.pm != 'none'
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          node-version: '20'
          cache: ${{ steps.detect-pm.outputs.pm }}

      - name: Install dependencies
        if: steps.detect-pm.outputs.pm != 'none'
        run: |
          if [ "${{ steps.detect-pm.outputs.pm }}" = "pnpm" ]; then
            pnpm install --frozen-lockfile
          elif [ "${{ steps.detect-pm.outputs.pm }}" = "yarn" ]; then
            yarn install --frozen-lockfile
          elif [ "${{ steps.detect-pm.outputs.pm }}" = "npm" ]; then
            npm ci
          fi

      - name: Install Droid CLI
        run: |
          curl -fsSL https://app.factory.ai/cli | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Extract comment and PR info
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber, commentBody, commentId;
            
            // Handle different event types
            if (context.eventName === 'issue_comment') {
              const comment = context.payload.comment;
              const isPR = !!context.payload.issue.pull_request;
              
              if (!isPR) {
                core.setFailed('This workflow only works on pull requests');
                return;
              }
              
              prNumber = context.payload.issue.number;
              commentBody = comment.body;
              commentId = comment.id;
            } else if (context.eventName === 'pull_request_review_comment') {
              const comment = context.payload.comment;
              prNumber = context.payload.pull_request.number;
              commentBody = comment.body;
              commentId = comment.id;
            } else if (context.eventName === 'pull_request_review') {
              const review = context.payload.review;
              prNumber = context.payload.pull_request.number;
              commentBody = review.body;
              commentId = review.id;
            } else if (context.eventName === 'pull_request') {
              const pr = context.payload.pull_request;
              prNumber = pr.number;
              commentBody = pr.body || pr.title;
              commentId = null;
            } else if (context.eventName === 'issues') {
              // For issues, we'll just create a comment and exit
              core.info('Issues support not yet implemented');
              return;
            }
            
            // Get PR details
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            // Extract command from comment/body
            const droidMatch = commentBody?.match(/@droid\s+(.+)/);
            const userRequest = droidMatch ? droidMatch[1].trim() : 'review this code';

            core.setOutput('pr_number', prNumber);
            core.setOutput('user_request', userRequest);
            core.setOutput('base_branch', pr.base.ref);
            core.setOutput('head_branch', pr.head.ref);
            core.setOutput('comment_id', commentId || '');

      - name: Setup branch
        id: setup-branch
        run: |
          # Fetch all branches
          git fetch origin
          
          # Check if there's already a droid branch for this PR
          EXISTING_DROID_BRANCH=$(git branch -r | grep "origin/droid/pr-${{ steps.extract.outputs.pr_number }}/" | head -1 | sed 's|origin/||' | xargs)
          
          if [ -n "$EXISTING_DROID_BRANCH" ]; then
            # Reuse existing branch for follow-up requests
            echo "Found existing droid branch: $EXISTING_DROID_BRANCH"
            git checkout "$EXISTING_DROID_BRANCH"
            git pull origin "$EXISTING_DROID_BRANCH"
            DROID_BRANCH="$EXISTING_DROID_BRANCH"
            IS_FOLLOWUP="true"
          else
            # Create new branch for first-time request
            git checkout ${{ steps.extract.outputs.head_branch }}
            
            REQUEST="${{ steps.extract.outputs.user_request }}"
            SANITIZED=$(echo "$REQUEST" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | cut -c1-30)
            TIMESTAMP=$(date +%s)
            DROID_BRANCH="droid/pr-${{ steps.extract.outputs.pr_number }}/${SANITIZED}-${TIMESTAMP}"
            git checkout -b "${DROID_BRANCH}"
            IS_FOLLOWUP="false"
          fi
          
          echo "droid_branch=${DROID_BRANCH}" >> $GITHUB_OUTPUT
          echo "is_followup=${IS_FOLLOWUP}" >> $GITHUB_OUTPUT

      - name: Add reaction to trigger comment
        id: reaction
        uses: actions/github-script@v7
        with:
          script: |
            const commentId = '${{ steps.extract.outputs.comment_id }}';
            
            if (commentId) {
              // Add eyes reaction to show we're looking at it
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: commentId,
                content: 'eyes'
              });
            }
            
            core.setOutput('trigger_comment_id', commentId);

      - name: Detect available skills
        id: detect-skills
        run: |
          SKILL_LIST=""
          if [ -d ".factory/skills" ]; then
            for skill_dir in .factory/skills/*/; do
              if [ -f "${skill_dir}SKILL.md" ]; then
                skill_name=$(basename "$skill_dir")
                if [ -z "$SKILL_LIST" ]; then
                  SKILL_LIST="$skill_name"
                else
                  SKILL_LIST="$SKILL_LIST, $skill_name"
                fi
              fi
            done
          fi
          echo "skill_list=${SKILL_LIST}" >> $GITHUB_OUTPUT
          echo "Detected skills: ${SKILL_LIST}"

      - name: Run Droid
        env:
          FACTORY_API_KEY: ${{ secrets.FACTORY_API_KEY }}
        run: |
          SKILL_PROMPT=""
          if [ -n "${{ steps.detect-skills.outputs.skill_list }}" ]; then
            SKILL_PROMPT=$(printf "Available skills in .factory/skills: %s\nUse these skills to guide your work and follow the coding standards they define.\n" "${{ steps.detect-skills.outputs.skill_list }}")
          fi
          
          # Save current HEAD for comparison later
          git rev-parse HEAD > /tmp/before-droid.txt
          
          cat > /tmp/droid-prompt.txt <<EOF
          You are a senior software engineer with vast knowledge and experience in best practices and coding standards.
          
          \${SKILL_PROMPT}
          User Request: \${{ steps.extract.outputs.user_request }}
          
          Context:
          - This is PR #\${{ steps.extract.outputs.pr_number }}
          - Base branch: \${{ steps.extract.outputs.base_branch }}
          - Current branch: \${{ steps.extract.outputs.head_branch }}
          - Repository: \${{ github.repository }}
          
          Instructions:
          1. Analyze the user's request carefully
          2. Explore the codebase to understand the project structure and conventions
          3. Make the necessary code changes following established patterns and standards
          4. Run relevant checks after making changes (lint, typecheck, tests, build, etc.)
          5. Provide a summary of what you did
          
          Guidelines:
          - Follow existing code patterns and conventions in the repository
          - Use the package manager detected in the project (npm, yarn, or pnpm)
          - Look for package.json scripts to understand available commands
          - Fix all errors and warnings before finishing
          - Write clean, maintainable, well-documented code
          - Test your changes thoroughly
          EOF
          
          $HOME/.local/bin/droid exec --skip-permissions-unsafe -f /tmp/droid-prompt.txt

      - name: Generate PR description
        if: steps.setup-branch.outputs.is_followup == 'false'
        id: generate-description
        env:
          FACTORY_API_KEY: ${{ secrets.FACTORY_API_KEY }}
        run: |
          # Get the diff of changes made
          BEFORE_HEAD=$(cat /tmp/before-droid.txt)
          AFTER_HEAD=$(git rev-parse HEAD)
          
          # Generate summary using git log and diff
          cat > /tmp/summary-prompt.txt <<EOF
          Analyze the following git commits and changes, then write a concise PR description.
          
          User's original request: ${{ steps.extract.outputs.user_request }}
          
          Commits made:
          $(git log ${BEFORE_HEAD}..${AFTER_HEAD} --oneline)
          
          Files changed:
          $(git diff --stat ${BEFORE_HEAD}..${AFTER_HEAD})
          
          Write a clear, professional PR description that:
          1. Starts with a brief summary (1-2 sentences)
          2. Lists the key changes made (bullet points)
          3. Mentions any important technical decisions
          4. Is under 500 characters
          
          Output only the PR description text, no extra commentary.
          EOF
          
          DESCRIPTION=$($HOME/.local/bin/droid exec --skip-permissions-unsafe -f /tmp/summary-prompt.txt 2>&1 | tail -20)
          
          # Save to output, escaping newlines for GitHub Actions
          echo "description<<DESCEOF" >> $GITHUB_OUTPUT
          echo "$DESCRIPTION" >> $GITHUB_OUTPUT
          echo "DESCEOF" >> $GITHUB_OUTPUT

      - name: Detect and push changes
        id: push
        run: |
          git config --global user.name "droid[bot]"
          git config --global user.email "droid[bot]@users.noreply.github.com"
          
          # Check if Droid made any commits
          BEFORE_HEAD=$(cat /tmp/before-droid.txt)
          AFTER_HEAD=$(git rev-parse HEAD)
          
          # Check for uncommitted changes OR new commits
          HAS_UNCOMMITTED=$(git status -s)
          HAS_NEW_COMMITS="false"
          
          if [ "$BEFORE_HEAD" != "$AFTER_HEAD" ]; then
            HAS_NEW_COMMITS="true"
            echo "Droid made commits: $BEFORE_HEAD -> $AFTER_HEAD"
          fi
          
          if [[ -n "$HAS_UNCOMMITTED" ]] || [[ "$HAS_NEW_COMMITS" == "true" ]]; then
            # If there are uncommitted changes, commit them
            if [[ -n "$HAS_UNCOMMITTED" ]]; then
              # Detect commit type from user request
              REQUEST_LOWER=$(echo "${{ steps.extract.outputs.user_request }}" | tr '[:upper:]' '[:lower:]')
              
              if [[ "$REQUEST_LOWER" == *"fix"* ]] || [[ "$REQUEST_LOWER" == *"bug"* ]]; then
                COMMIT_TYPE="fix"
              elif [[ "$REQUEST_LOWER" == *"add"* ]] || [[ "$REQUEST_LOWER" == *"implement"* ]]; then
                COMMIT_TYPE="feat"
              elif [[ "$REQUEST_LOWER" == *"refactor"* ]]; then
                COMMIT_TYPE="refactor"
              elif [[ "$REQUEST_LOWER" == *"test"* ]]; then
                COMMIT_TYPE="test"
              elif [[ "$REQUEST_LOWER" == *"doc"* ]]; then
                COMMIT_TYPE="docs"
              elif [[ "$REQUEST_LOWER" == *"style"* ]] || [[ "$REQUEST_LOWER" == *"format"* ]]; then
                COMMIT_TYPE="style"
              else
                COMMIT_TYPE="chore"
              fi
              
              git add -A
              git commit -m "${COMMIT_TYPE}: ${{ steps.extract.outputs.user_request }}" \
                         -m "Automated changes by @droid" \
                         -m "Original request: ${{ steps.extract.outputs.user_request }}" \
                         -m "Related to PR #${{ steps.extract.outputs.pr_number }}"
            fi
            
            # Push all commits (both Droid's and ours)
            git push origin ${{ steps.setup-branch.outputs.droid_branch }}
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.push.outputs.has_changes == 'true'
        id: create-pr
        uses: actions/github-script@v7
        with:
          script: |
            const userRequest = '${{ steps.extract.outputs.user_request }}';
            const headBranch = '${{ steps.extract.outputs.head_branch }}';
            const prNumber = '${{ steps.extract.outputs.pr_number }}';
            const repository = '${{ github.repository }}';
            const runId = '${{ github.run_id }}';
            
            const isFollowup = '${{ steps.setup-branch.outputs.is_followup }}' === 'true';
            const generatedDesc = `${{ steps.generate-description.outputs.description }}`;
            
            const prTitle = '🤖 Droid: ' + userRequest;
            
            let prBody;
            if (isFollowup) {
              // For follow-ups, just update with a comment instead
              prBody = null;
            } else {
              // For new PRs, use generated description
              prBody = '## 🤖 Automated Changes by Droid\n\n' +
                       '**Original Request:** ' + userRequest + '\n\n' +
                       (generatedDesc ? '**Summary:**\n' + generatedDesc + '\n\n' : '') +
                       '---\n\n' +
                       '*To apply these changes to your PR, merge this PR into `' + headBranch + '`*\n\n' +
                       '[View original discussion](https://github.com/' + repository + '/pull/' + prNumber + ') | ' +
                       '[View workflow run](https://github.com/' + repository + '/actions/runs/' + runId + ')';
            }
            
            if (isFollowup) {
              // Find existing PR for this branch
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: context.repo.owner + ':${{ steps.setup-branch.outputs.droid_branch }}',
                base: headBranch,
                state: 'open'
              });
              
              if (prs.length > 0) {
                const existingPr = prs[0];
                
                // Add comment about the follow-up
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existingPr.number,
                  body: '## 🔄 Follow-up Request\n\n' +
                        '**Request:** ' + userRequest + '\n\n' +
                        'I have updated this PR with the additional changes.\n\n' +
                        '[View workflow run](https://github.com/' + repository + '/actions/runs/' + runId + ')'
                });
                
                core.setOutput('pr_number', existingPr.number);
                core.setOutput('pr_url', existingPr.html_url);
                core.setOutput('is_new_pr', 'false');
                return existingPr.number;
              }
            }
            
            // Create new PR
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: prTitle,
              head: '${{ steps.setup-branch.outputs.droid_branch }}',
              base: headBranch,
              body: prBody
            });
            
            core.setOutput('pr_number', pr.number);
            core.setOutput('pr_url', pr.html_url);
            core.setOutput('is_new_pr', 'true');
            return pr.number;

      - name: Update reactions and reply
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ job.status }}' === 'success';
            const hasChanges = '${{ steps.push.outputs.has_changes }}' === 'true';
            const newPrNumber = '${{ steps.create-pr.outputs.pr_number }}';
            const userRequest = '${{ steps.extract.outputs.user_request }}';
            const prUrl = '${{ steps.create-pr.outputs.pr_url }}';
            const repository = '${{ github.repository }}';
            const runId = '${{ github.run_id }}';
            const triggerCommentId = '${{ steps.reaction.outputs.trigger_comment_id }}';
            
            // Add final reaction to original comment
            if (triggerCommentId) {
              let reaction = '';
              if (success && hasChanges) {
                reaction = 'rocket'; // 🚀 for successful changes
              } else if (success && !hasChanges) {
                reaction = '+1'; // 👍 for completed but no changes
              } else {
                reaction = 'confused'; // 😕 for failures
              }
              
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: triggerCommentId,
                content: reaction
              });
            }
            
            // Create a reply comment with results
            let body = '';
            
            if (success && hasChanges && newPrNumber) {
              const isNewPr = '${{ steps.create-pr.outputs.is_new_pr }}' === 'true';
              if (isNewPr) {
                body = '✅ Done! I have created PR #' + newPrNumber + ' with the requested changes.\n\n' +
                       '**Review and merge:** [PR #' + newPrNumber + '](' + prUrl + ')\n\n' +
                       '[View workflow run](https://github.com/' + repository + '/actions/runs/' + runId + ')';
              } else {
                body = '✅ Done! I have updated PR #' + newPrNumber + ' with the additional changes.\n\n' +
                       '**Review:** [PR #' + newPrNumber + '](' + prUrl + ')\n\n' +
                       '[View workflow run](https://github.com/' + repository + '/actions/runs/' + runId + ')';
              }
            } else if (success && !hasChanges) {
              body = '✅ Task completed - no changes needed.\n\n' +
                     'The code already meets the requirements or I could not find anything to change.\n\n' +
                     '[View workflow run](https://github.com/' + repository + '/actions/runs/' + runId + ')';
            } else {
              body = '❌ Task failed\n\n' +
                     'Check the workflow run for details.\n\n' +
                     '[View workflow run](https://github.com/' + repository + '/actions/runs/' + runId + ')';
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.extract.outputs.pr_number }},
              body: body
            });
